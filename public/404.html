<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sayfa Bulunamadı — dokunduur</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#111827" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #ffffff;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        text-align: center;
      }
      .container { max-width: 28rem; }
      h1 { font-size: 2rem; margin: 0 0 0.75rem; }
      p { color: #6b7280; margin: 0 0 1.5rem; line-height: 1.6; }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: #111827;
        color: #ffffff;
        text-decoration: none;
        border-radius: 9999px;
        font-weight: 500;
      }
      a:hover { background: #374151; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Sayfa bulunamadı</h1>
      <p>Aradığınız sayfa kaldırılmış, adı değiştirilmiş veya geçici olarak ulaşılamıyor olabilir.</p>
      <a href="/">Ana sayfaya dön</a>
    </main>
  </body>
</html>
